version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - gosimple
    - bodyclose
    - noctx
    - unconvert

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/ChengaDev/runx

exclusions:
  rules:
    - path: _test\.go
      linters:
        - errcheck
